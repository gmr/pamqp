name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pamqp/**'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group docs

      - name: Deploy docs
        run: uv run mkdocs gh-deploy --force
